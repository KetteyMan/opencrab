<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>opencrab Homepage Mockup</title>
    <link rel="stylesheet" href="./homepage.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <button class="brand-button" aria-label="opencrab 首页">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M7.5 11.8c0-2.9 2.1-5.3 4.9-5.3 2.5 0 4.5 1.5 5.1 3.8" />
              <path d="M16.6 12.2c0 2.9-2.1 5.3-4.9 5.3-2.5 0-4.5-1.5-5.1-3.8" />
              <path d="M8.5 9.4 6.6 7.8M17.4 16.2l-1.9-1.6M15.8 8.7l1.6-2M8.2 15.3l-1.6 2" />
            </svg>
          </button>
          <div class="brand-copy">OpenCrab</div>
        </div>

        <div class="sidebar-actions">
          <button class="sidebar-action">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 5v14M5 12h14" />
              </svg>
            </span>
            <span>新对话</span>
          </button>

          <button class="sidebar-action">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="11" cy="11" r="5.5" />
                <path d="m16 16 3.5 3.5" />
              </svg>
            </span>
            <span>搜索</span>
          </button>
        </div>

        <nav class="primary-nav" aria-label="主导航">
          <button class="nav-item active">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 7.5h12M6 12h8M6 16.5h10" />
              </svg>
            </span>
            <span>对话</span>
          </button>

          <button class="nav-item">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M4.5 8.5h15M4.5 15.5h15M7 5.5v13M17 5.5v13" />
              </svg>
            </span>
            <span>Channels</span>
          </button>

          <button class="nav-item">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="5.5" y="6" width="13" height="12" rx="2.5" />
                <path d="M8.5 4.5v3M15.5 4.5v3M8.5 11.5h7" />
              </svg>
            </span>
            <span>任务</span>
          </button>

          <button class="nav-item">
            <span class="icon-wrap">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12 4.5 9.6 9.4 4.2 10.2l3.9 3.8-.9 5.4 4.8-2.5 4.8 2.5-.9-5.4 3.9-3.8-5.4-.8z" />
              </svg>
            </span>
            <span>Skills</span>
          </button>
        </nav>

        <section class="sidebar-section">
          <button class="section-link">
            <span>对话文件夹</span>
            <span class="chevron">›</span>
          </button>
          <div class="folder-list">
            <button class="folder-item active-folder">
              <span>全部对话</span>
              <span class="meta-inline">18</span>
            </button>
            <button class="folder-item">
              <span>产品讨论</span>
              <span class="meta-inline">6</span>
            </button>
            <button class="folder-item">
              <span>每周回顾</span>
              <span class="meta-inline">8</span>
            </button>
          </div>
        </section>

        <section class="sidebar-section conversations-section">
          <button class="section-link">
            <span>最近对话</span>
            <span class="chevron">›</span>
          </button>
          <div class="conversation-list">
            <button class="conversation-item selected">
              <span class="conversation-line">
                <span class="conversation-title">opencrab 首页结构整理</span>
                <span class="meta-inline">刚刚</span>
              </span>
            </button>
            <button class="conversation-item">
              <span class="conversation-line">
                <span class="conversation-title">任务中心信息架构</span>
                <span class="meta-inline">今天</span>
              </span>
            </button>
            <button class="conversation-item">
              <span class="conversation-line">
                <span class="conversation-title">Channel 绑定流程</span>
                <span class="meta-inline">昨天</span>
              </span>
            </button>
            <button class="conversation-item">
              <span class="conversation-line">
                <span class="conversation-title">Skills 首页空态</span>
                <span class="meta-inline">昨天</span>
              </span>
            </button>
          </div>
        </section>

        <button class="profile-entry">
          <span class="avatar">S</span>
          <span class="profile-copy">
            <strong>sky tong</strong>
            <small>设置</small>
          </span>
        </button>
      </aside>

      <main class="main-panel">
        <header class="topbar">
          <div class="brand-heading">OpenCrab</div>
        </header>

        <section class="center-stage">
          <h1>今天你想处理什么？</h1>

          <div class="composer-panel" aria-label="输入框">
            <textarea
              class="composer-input"
              placeholder="发一句话，或上传文件开始"
            ></textarea>

            <div class="composer-toolbar">
              <div class="toolbar-left">
                <button class="toolbar-icon" aria-label="上传">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" />
                  </svg>
                </button>
                <button class="tool-chip">推理增强</button>
                <button class="tool-chip">模型</button>
              </div>

              <div class="toolbar-right">
                <button class="send-button" aria-label="发送">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="m5 12 13-6-3 6 3 6z" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
